server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: qualquer rota desconhecida cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets versionados pelo Vite (hash no nome do arquivo)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Mapa e imagens de locais: cache moderado (você pode atualizar o conteúdo)
    location ~* ^/(map|locations)/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
